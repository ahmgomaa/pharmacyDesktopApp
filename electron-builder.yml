appId: com.ahmgomaa.pharmacydesktopapp
productName: Pharmacy Desktop App
directories:
  buildResources: build
  output: release
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,mjs,ts,cjs}'
  - '!{.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
  - '**/node_modules/better-sqlite3/build/**'
win:
  executableName: pharmacy-desktop-app
  target:
    - target: nsis
      arch: [x64]
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.medical
linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Office
